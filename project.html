<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project — Arthur Valente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css?v=9"/>
</head>
<body>

  <nav class="site-nav">
    <a class="nav-logo" href="index.html">ARTHUR&nbsp;&nbsp;VALENTE</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <a class="project-back" href="index.html" aria-label="Back to all projects">
    <span class="back-arrow"></span>
    <span class="back-text">All Projects</span>
  </a>

  <article id="projectRoot">
    <!-- Rendered dynamically based on ?slug=... -->
  </article>

  <footer>
    <span>© 2026 Arthur Valente</span>
    <span>Architectural Visualization Studio</span>
  </footer>

  <script src="projects.js?v=14"></script>
  <script src="app.js?v=5"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      var project = slug && window.PROJECT_MAP[slug];
      var root = document.getElementById('projectRoot');

      if (!project) {
        root.innerHTML =
          '<section style="padding:200px var(--pad-x-desktop) 100px; text-align:center;">' +
            '<p class="project-eyebrow" style="opacity:1; transform:none; animation:none;">Project not found</p>' +
            '<h1 class="project-h1" style="opacity:1; transform:none; animation:none; margin-top:14px;">This page does not exist.</h1>' +
            '<p style="margin-top:28px;"><a class="project-nav-link" href="index.html"><span class="arrow"></span> Back to work</a></p>' +
          '</section>';
        document.title = 'Not found — Arthur Valente';
        return;
      }

      document.title = project.title + ' — Arthur Valente';

      // Determine prev / next within PROJECTS array
      var idx = window.PROJECTS.findIndex(function (p) { return p.slug === project.slug; });
      var prev = window.PROJECTS[(idx - 1 + window.PROJECTS.length) % window.PROJECTS.length];
      var next = window.PROJECTS[(idx + 1) % window.PROJECTS.length];

      var hero = project.images[0];
      var heroPos = hero.position ? ' style="object-position:' + hero.position + ';"' : '';

      // Detect video by file extension
      function isVideo(src) { return /\.(mp4|webm|mov)$/i.test(src); }

      // Render media element (img or video)
      function renderMedia(item, opts) {
        opts = opts || {};
        var pos = item.position ? ' style="object-position:' + item.position + ';"' : '';
        if (isVideo(item.src)) {
          var poster = item.poster || item.src.replace(/_anim\.(mp4|webm|mov)$/i, '.jpg');
          var posterAttr = poster ? ' poster="' + poster.replace(/"/g, '&quot;') + '"' : '';
          return '<video src="' + item.src + '" autoplay muted loop playsinline preload="' + (opts.preload || 'auto') + '"' + posterAttr + pos + '></video>';
        }
        return '<img src="' + item.src + '" alt="' + (opts.alt || '') + '"' +
          ' loading="' + (opts.loading || 'lazy') + '" decoding="async" fetchpriority="' + (opts.priority || 'low') + '"' + pos + '/>';
      }

      // Build info blocks
      function infoBlock(label, value) {
        if (!value) return '';
        return '<div class="info-block"><p class="info-label">' + label + '</p><p class="info-value">' + value + '</p></div>';
      }

      // Gallery shows everything EXCEPT the hero (when there are multiple images)
      var galleryItems = project.images.length > 1 ? project.images.slice(1) : [];

      // Build gallery
      var galleryHTML = '';
      galleryItems.forEach(function (img, i) {
        var media = renderMedia(img, {
          loading: i < 2 ? 'eager' : 'lazy',
          priority: i < 1 ? 'high' : 'low',
          alt: project.title + (img.caption ? ' — ' + img.caption : '')
        });
        var videoFlag = isVideo(img.src) ? ' data-video="1"' : '';
        var cursorAttrs = isVideo(img.src) ? '' : ' data-cursor="image" data-cursor-label="Expand"';
        galleryHTML +=
          '<figure class="gallery-figure" data-index="' + i + '"' + videoFlag + ' data-reveal>' +
            '<div class="media"' + cursorAttrs + '>' + media + '</div>' +
            (img.caption ? '<figcaption class="gallery-caption">' + img.caption + '</figcaption>' : '') +
          '</figure>';
      });
      var gallerySection = galleryItems.length > 0
        ? '<section class="project-gallery">' + galleryHTML + '</section>'
        : '';

      root.innerHTML =
        '<div class="project-hero">' +
          '<div class="media">' +
            renderMedia(hero, { loading: 'eager', priority: 'high', preload: 'auto', alt: project.title }) +
          '</div>' +
        '</div>' +

        '<header class="project-header">' +
          '<div class="project-title-block">' +
            '<p class="project-eyebrow">' + (project.type || 'Project') + ' · ' + (project.year || '') + '</p>' +
            '<h1 class="project-h1">' + project.title + '</h1>' +
            '<p class="project-client">' + project.client + '</p>' +
          '</div>' +
          '<div class="project-info">' +
            infoBlock('Client', project.client) +
            infoBlock('Location', project.location) +
            infoBlock('Year', project.year) +
            infoBlock('Type', project.type) +
          '</div>' +
        '</header>' +

        (project.description ?
          '<section class="project-description"><p>' + project.description + '</p></section>'
          : '') +

        gallerySection +

        '<nav class="project-footer-nav">' +
          '<a class="project-nav-link prev" href="project.html?slug=' + encodeURIComponent(prev.slug) + '">' +
            '<span class="arrow"></span> Previous' +
            '<span class="project-next-title">' + prev.title + '</span>' +
          '</a>' +
          '<a class="project-nav-link next" href="project.html?slug=' + encodeURIComponent(next.slug) + '">' +
            'Next <span class="arrow"></span>' +
            '<span class="project-next-title">' + next.title + '</span>' +
          '</a>' +
        '</nav>';

      // Hook lazy load & reveal for freshly inserted elements
      var medias = root.querySelectorAll('.media');
      medias.forEach(function (m) {
        var img = m.querySelector('img');
        var video = m.querySelector('video');
        if (img) {
          if (img.complete && img.naturalWidth > 0) {
            m.classList.add('loaded');
          } else {
            img.addEventListener('load', function () { m.classList.add('loaded'); }, { once: true });
            img.addEventListener('error', function () { m.classList.add('loaded'); }, { once: true });
          }
        } else if (video) {
          if (video.readyState >= 2) {
            m.classList.add('loaded');
          } else {
            video.addEventListener('loadeddata', function () { m.classList.add('loaded'); }, { once: true });
            video.addEventListener('error', function () { m.classList.add('loaded'); }, { once: true });
            // Some browsers don't fire loadeddata reliably; fall back to canplay
            video.addEventListener('canplay', function () { m.classList.add('loaded'); }, { once: true });
          }
        }
      });

      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
      root.querySelectorAll('[data-reveal]').forEach(function (el, i) {
        el.style.transitionDelay = (Math.min(i, 5) * 90) + 'ms';
        io.observe(el);
      });

      // Lightbox wiring — only static images, videos are skipped
      var lbItems = [];
      var lbIndexByGallery = {};
      galleryItems.forEach(function (img, i) {
        if (isVideo(img.src)) return;
        lbIndexByGallery[i] = lbItems.length;
        lbItems.push({
          src: img.src,
          title: project.title,
          sub: project.client + (img.caption ? ' — ' + img.caption : '')
        });
      });
      root.querySelectorAll('.gallery-figure').forEach(function (figure, i) {
        if (figure.hasAttribute('data-video')) return;
        var media = figure.querySelector('.media');
        media.addEventListener('click', function () {
          if (lbIndexByGallery[i] !== undefined) {
            window.Lightbox.open(lbItems, lbIndexByGallery[i]);
          }
        });
      });
    })();
  </script>
</body>
</html>
