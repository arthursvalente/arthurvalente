<body>

  <header class="intro">
    <span class="eyebrow">Selected Work</span>

  </header>

  <main class="work">
    <div class="columns-wrap">
      <div class="col col-left" id="colLeft"></div>
      <div class="col col-right" id="colRight"></div>
    </div>
  </main>

  <footer>
    <span>© 2026 Arthur Valente</span>

  </footer>

  <script src="projects.js?v=6"></script>
  <script src="app.js?v=3"></script>
  <script>
    (function () {
      var colLeft = document.getElementById('colLeft');
      var colRight = document.getElementById('colRight');

      var globalIndex = 0;
      function renderColumn(target, entries) {
        var html = '';
        entries.forEach(function (entry) {
          var project = window.PROJECT_MAP[entry.slug];
          if (!project) return;
          var img = project.images[entry.image];
          if (!img) return;
          var isPriority = globalIndex < 2;
          var loadingAttr = isPriority ? 'eager' : 'lazy';
          var fetchAttr   = isPriority ? 'high' : 'low';
          var positionStyle = img.position ? ' style="object-position:' + img.position + ';"' : '';
          html +=
            '<a class="project-card" href="project.html?slug=' + encodeURIComponent(project.slug) +
            '" data-cursor="image" data-cursor-label="Project" data-reveal>' +
              '<div class="card-inner">' +
                '<div class="media">' +
                  '<img src="' + img.src + '" alt="' + project.title + '"' +
                    ' loading="' + loadingAttr + '" decoding="async" fetchpriority="' + fetchAttr + '"' +
                    positionStyle + '/>' +
                '</div>' +
                '<div class="project-meta">' +
                  '<p class="project-sub">' + project.client + '</p>' +
                  '<p class="project-title">' + project.title + '</p>' +
                '</div>' +
              '</div>' +
            '</a>';
          globalIndex++;
        });
        target.innerHTML = html;
      }

      renderColumn(colLeft, window.GRID.left);
      renderColumn(colRight, window.GRID.right);

      // Re-run reveal + lazy setup for freshly inserted elements
      var cards = document.querySelectorAll('.project-card');
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

      cards.forEach(function (card, i) {
        // Subtle staggered delay based on position in column
        var col = card.parentElement;
        var siblings = Array.prototype.slice.call(col.children);
        var localIdx = siblings.indexOf(card);
        card.style.transitionDelay = (Math.min(localIdx, 6) * 70) + 'ms';
        io.observe(card);

        var media = card.querySelector('.media');
        var img = media.querySelector('img');
        if (img.complete && img.naturalWidth > 0) {
          media.classList.add('loaded');
        } else {
          img.addEventListener('load', function () { media.classList.add('loaded'); }, { once: true });
          img.addEventListener('error', function () { media.classList.add('loaded'); }, { once: true });
        }
      });

      // ────────────────────────────────────────────────────────────────────
      // PARALLAX — left column drifts down, right column drifts up.
      // Subtle, ~40px max offset on a long page. Lerp-smoothed.
      // Skipped on touch devices and reduced-motion users.
      // ────────────────────────────────────────────────────────────────────
      var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var isCoarse = window.matchMedia('(pointer: coarse)').matches;
      if (!prefersReduced && !isCoarse) {
        var leftInners  = document.querySelectorAll('.col-left  .card-inner');
        var rightInners = document.querySelectorAll('.col-right .card-inner');
        var speed = 0.045;
        var currentY = 0, targetY = 0, rafId = null;

        function tick() {
          currentY += (targetY - currentY) * 0.09;
          var yLeft  = (currentY * speed).toFixed(2);
          var yRight = (-currentY * speed).toFixed(2);
          for (var i = 0; i < leftInners.length;  i++) leftInners[i].style.transform  = 'translate3d(0,' + yLeft  + 'px,0)';
          for (var j = 0; j < rightInners.length; j++) rightInners[j].style.transform = 'translate3d(0,' + yRight + 'px,0)';
          if (Math.abs(targetY - currentY) > 0.4) {
            rafId = requestAnimationFrame(tick);
          } else {
            rafId = null;
          }
        }

        window.addEventListener('scroll', function () {
          targetY = window.scrollY;
          if (!rafId) rafId = requestAnimationFrame(tick);
        }, { passive: true });
      }
    })();
  </script>
</body>
</html>
