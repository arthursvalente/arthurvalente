<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Arthur Valente</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f4f3f0; --ink: #1a1a1a; --muted: #888; --font: 'Jost','Futura','Century Gothic',sans-serif; }
    body { background: var(--bg); color: var(--ink); font-family: var(--font); font-weight: 400; min-height: 100vh; display: flex; flex-direction: column; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; padding: 28px 40px;
      background: var(--bg);
    }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a { font-size: 14px; font-weight: 300; letter-spacing: 0.06em; text-decoration: none; color: var(--ink); transition: opacity 0.2s; }
    .nav-links a:hover, .nav-links a.active { opacity: 0.45; }
    .nav-logo { position: absolute; left: 50%; transform: translateX(-50%); font-size: 15px; font-weight: 300; letter-spacing: 0.28em; text-decoration: none; color: var(--ink); white-space: nowrap; }

    main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 160px 160px 80px; }

    .contact-label {
      font-size: 12px; font-weight: 300; letter-spacing: 0.18em; color: var(--muted); margin-bottom: 64px;
      opacity: 0; transform: translateY(12px);
      animation: fadeUp 0.8s ease 0.1s forwards;
    }

    .contact-item {
      display: flex; align-items: baseline; gap: 48px;
      padding: 28px 0; border-top: 1px solid #ddd;
      opacity: 0; transform: translateY(12px);
      animation: fadeUp 0.7s ease forwards;
    }
    .contact-item:last-child { border-bottom: 1px solid #ddd; }
    .contact-item:nth-child(1) { animation-delay: 0.2s; }
    .contact-item:nth-child(2) { animation-delay: 0.35s; }

    .contact-type { font-size: 11px; font-weight: 300; letter-spacing: 0.14em; color: var(--muted); width: 100px; flex-shrink: 0; }
    .contact-value { font-size: 20px; font-weight: 300; letter-spacing: 0.04em; text-decoration: none; color: var(--ink); transition: opacity 0.2s; }
    .contact-value:hover { opacity: 0.45; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    footer { padding: 40px 160px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ddd; }
    footer span { font-size: 12px; font-weight: 300; letter-spacing: 0.06em; color: var(--muted); }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; flex-direction: column; align-items: flex-start; gap: 12px; }
      .nav-logo { position: static; transform: none; font-size: 13px; letter-spacing: 0.22em; }
      .nav-links { gap: 24px; }
      main { padding: 160px 24px 60px; }
      .contact-item { gap: 24px; }
      .contact-value { font-size: 15px; }
      footer { padding: 32px 24px; flex-direction: column; gap: 12px; text-align: center; }
    }
  </style>
</head>
<body>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <a class="nav-logo" href="index.html">ARTHUR&nbsp;&nbsp;VALENTE</a>
  </nav>

  <main>
    <p class="contact-label">CONTACT</p>
    <div class="contact-item">
      <span class="contact-type">EMAIL</span>
      <a class="contact-value" href="mailto:arthur@emberatelier.com">arthur@emberatelier.com</a>
    </div>
    <div class="contact-item">
      <span class="contact-type">INSTAGRAM</span>
      <a class="contact-value" href="https://www.instagram.com/arthursvalente" target="_blank">@arthursvalente</a>
    </div>
  </main>

  <footer>
    <span>© 2025 Arthur Valente</span>
    <span>Architectural Visualization Studio</span>
  </footer>
</body>
</html>
